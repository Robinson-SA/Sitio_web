{% extends 'base.html' %}
{% block title %}Agregar Foto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="vista-panel">
            <h5 class="fw-bold mb-1 text-muted">Agregar Foto</h5>
            <p class="text-muted small mb-4">Empleado: <strong>{{ empleado.nombre }}</strong></p>

            <form method="post" enctype="multipart/form-data" novalidate>
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Imagen (JPG o PNG, máx. 5MB)</label>
                    {{ form.foto }}
                    {% if form.foto.errors %}
                        <div class="text-danger small mt-1">{{ form.foto.errors|join:', ' }}</div>
                    {% endif %}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-accion btn-agregar flex-fill">
                        <i class="bi bi-upload me-1"></i>Guardar
                    </button>
                    <a href="{% url 'lista_empleados' %}" class="btn btn-outline-secondary flex-fill">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
