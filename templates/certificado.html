{% extends 'base.html' %}
{% block title %}Agregar Certificado{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="vista-panel">
            <h5 class="fw-bold mb-1 text-muted">Agregar Certificado</h5>
            <p class="text-muted small mb-4">Empleado: <strong>{{ empleado.nombre }}</strong></p>

            <form method="post" enctype="multipart/form-data" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Nombre del certificado</label>
                    {{ form.nombre }}
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Archivo</label>
                    {{ form.archivo }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-accion btn-agregar flex-fill">
                        <i class="bi bi-upload me-1"></i>Guardar
                    </button>
                    <a href="{% url 'modificar_empleado' empleado.pk %}" class="btn btn-outline-secondary flex-fill">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
